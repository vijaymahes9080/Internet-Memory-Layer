<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #21262d;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      color: #58a6ff;
    }
    .status-badge {
      display: flex;
      align-items: center;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 12px;
      background-color: #161b22;
      border: 1px solid #30363d;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #3fb950;
      margin-right: 6px;
    }
    .status-dot.offline {
      background-color: #f85149;
    }
    .stat-card {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .stat-title {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #f0f6fc;
    }
    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .switch-label {
      font-size: 14px;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #238636;
      color: #ffffff;
      text-align: center;
      padding: 10px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #2ea043;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">IML Local Brain</div>
    <div class="status-badge">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">Online</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-title">Memories Indexed Today</div>
    <div id="memories-count" class="stat-value">12</div>
  </div>

  <div class="control-row">
    <span class="switch-label">Enable Ingestion</span>
    <input type="checkbox" id="ingest-toggle" checked>
  </div>

  <button id="open-dashboard" class="btn">Open Local Dashboard</button>

  <script src="popup.js"></script>
</body>
</html>
